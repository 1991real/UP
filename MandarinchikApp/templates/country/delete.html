{% extends 'base.html' %}

{% block title %}
Удаление страны
{% endblock %}

{% block content %}

<div class="card">

    <h2>Удаление страны</h2>

    <p>
        Вы уверены, что хотите удалить
        "{{ country.country }}"?
    </p>

    <form method="post">

        {% csrf_token %}

        <button type="submit">
            Удалить
        </button>

    </form>

    <br>

    <a href="{% url 'country_list' %}">
        Отмена
    </a>

</div>

{% endblock %}
